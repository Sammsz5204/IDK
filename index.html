<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sam — profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ============================================
       CONFIGURAÇÃO — edite aqui seus dados
       ============================================ */

    :root {
      /* Cores */
      --red-deep:    #1a0000;
      --red-dark:    #2d0505;
      --red-mid:     #6b0f0f;
      --red-bright:  #c0392b;
      --red-accent:  #e74c3c;
      --red-glow:    rgba(192, 57, 43, 0.35);
      --text-main:   #f5e6e6;
      --text-muted:  #c9a0a0;
      --text-faint:  #7a4a4a;
      --card-bg:     rgba(45, 5, 5, 0.75);
      --card-border: rgba(192, 57, 43, 0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--red-deep);
      color: var(--text-main);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
    }

    /* Fundo animado */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(107,15,15,0.6) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(192,57,43,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 10% 60%, rgba(192,57,43,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      from { opacity: 0.7; }
      to   { opacity: 1; }
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Layout principal */
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      gap: 14px;
    }

    /* ============ CARD PRINCIPAL ============ */
    .profile-card {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
      box-shadow: 0 0 60px rgba(192,57,43,0.15), 0 20px 60px rgba(0,0,0,0.5);
      animation: cardIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Banner do card */
    .card-banner {
      width: 100%;
      height: 100px;
      background: linear-gradient(135deg, #4a0a0a 0%, #8b1a1a 50%, #6b0f0f 100%);
      position: relative;
      overflow: hidden;
    }

    .card-banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 20px,
        rgba(0,0,0,0.05) 20px,
        rgba(0,0,0,0.05) 21px
      );
    }

    /* Avatar */
    .avatar-wrap {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 5px;
      z-index: 2;
    }

    .avatar-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      padding: 3px;
      background: conic-gradient(
        from 0deg,
        var(--red-accent),
        var(--red-mid),
        var(--red-accent),
        var(--red-mid),
        var(--red-accent)
      );
      
    }

    @keyframes rotateBorder {
      to { transform: rotate(360deg); }
    }

    .avatar-img {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: 3px solid var(--red-deep);
      object-fit: cover;
      display: block;
      background: var(--red-dark);
    }

    /* Status dot */
    .status-dot {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid var(--red-deep);
      background: #23a55a;
      box-shadow: 0 0 8px rgba(35,165,90,0.6);
    }

    .status-dot.idle    { background: #f0b132; box-shadow: 0 0 8px rgba(240,177,50,0.6); }
    .status-dot.dnd     { background: #f23f42; box-shadow: 0 0 8px rgba(242,63,66,0.6); }
    .status-dot.offline { background: #80848e; box-shadow: none; }

    /* Corpo do card */
    .card-body {
      padding: 52px 28px 24px;
      text-align: center;
      position: relative;
    }

    .profile-name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-main);
      line-height: 1;
      margin-bottom: 6px;
    }

    .profile-bio {
      font-size: 13px;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      font-style: italic;
      margin-bottom: 20px;
      min-height: 18px;
    }

    /* Activity (Discord RPC) */
    .activity-card {
      display: none;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(192,57,43,0.2);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 20px;
      text-align: left;
      animation: fadeSlide 0.4s ease both;
    }

    .activity-card.visible { display: flex; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .activity-icon {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--red-mid);
      flex-shrink: 0;
    }

    .activity-text { flex: 1; min-width: 0; }

    .activity-type {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-faint);
      font-family: 'Space Mono', monospace;
    }

    .activity-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .activity-detail {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Spotify activity */
    .spotify-art {
      width: 46px;
      height: 46px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    /* Redes sociais */
    .socials {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(192,57,43,0.2);
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .social-link:hover {
      background: rgba(192,57,43,0.2);
      border-color: var(--red-accent);
      color: var(--text-main);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(192,57,43,0.3);
    }

    .social-link svg { width: 17px; height: 17px; fill: currentColor; }

    /* Views */
    .views {
      position: absolute;
      bottom: 16px;
      left: 18px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-faint);
      font-family: 'Space Mono', monospace;
    }

    .views svg { width: 13px; height: 13px; fill: currentColor; opacity: 0.6; }

    /* ============ MUSIC PLAYER ============ */
    .music-player {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(192,57,43,0.1), 0 20px 60px rgba(0,0,0,0.4);
      overflow: hidden;
      animation: cardIn 0.7s 0.15s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .player-main {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
    }

    .track-art-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .track-art {
      width: 54px;
      height: 54px;
      border-radius: 10px;
      object-fit: cover;
      background: var(--red-mid);
      display: block;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: transform 0.3s ease;
    }

    .player-main:hover .track-art { transform: scale(1.05); }

    .track-info { flex: 1; min-width: 0; }

    .track-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* Progress */
    .player-progress {
      padding: 0 16px 4px;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      color: var(--text-faint);
      margin-bottom: 5px;
    }

    .progress-bar {
      position: relative;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      cursor: pointer;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red-bright), var(--red-accent));
      border-radius: 4px;
      transition: width 0.5s linear;
      box-shadow: 0 0 10px rgba(192,57,43,0.5);
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: var(--thumb-pos, 0%);
      width: 12px;
      height: 12px;
      background: var(--text-main);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.2s, left 0.5s linear;
      margin-left: -6px;
      pointer-events: none;
    }

    .progress-bar:hover::after { opacity: 1; }

    /* Controles */
    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px 14px;
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .ctrl-btn:hover { color: var(--text-main); transform: scale(1.15); }
    .ctrl-btn svg   { width: 16px; height: 16px; fill: currentColor; }

    .ctrl-btn.play-pause {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--red-bright), var(--red-accent));
      color: #fff;
      box-shadow: 0 4px 16px rgba(192,57,43,0.4);
    }

    .ctrl-btn.play-pause:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 24px rgba(192,57,43,0.6);
    }

    .ctrl-btn.play-pause svg { width: 18px; height: 18px; }

    /* Volume */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px 14px;
    }

    .volume-icon { color: var(--text-faint); flex-shrink: 0; }
    .volume-icon svg { width: 14px; height: 14px; fill: currentColor; }

    .volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 3px;
      background: rgba(255,255,255,0.08);
      outline: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--red-accent);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(192,57,43,0.5);
    }

    /* Playlist */
    .playlist {
      border-top: 1px solid rgba(192,57,43,0.12);
      max-height: 200px;
      overflow-y: auto;
    }

    .playlist::-webkit-scrollbar { width: 4px; }
    .playlist::-webkit-scrollbar-track { background: transparent; }
    .playlist::-webkit-scrollbar-thumb { background: var(--red-mid); border-radius: 4px; }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      transition: background 0.2s ease;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .playlist-item:hover { background: rgba(192,57,43,0.1); }
    .playlist-item.active { background: rgba(192,57,43,0.15); }

    .pl-num {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--text-faint);
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }

    .playlist-item.active .pl-num { color: var(--red-accent); }

    .pl-art {
      width: 34px;
      height: 34px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--red-mid);
      flex-shrink: 0;
    }

    .pl-info { flex: 1; min-width: 0; }

    .pl-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .playlist-item.active .pl-title { color: var(--red-accent); }

    .pl-artist {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pl-dur {
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      color: var(--text-faint);
      flex-shrink: 0;
    }

    /* Loader */
    .loader {
      display: flex;
      gap: 5px;
      justify-content: center;
      padding: 4px 0;
    }

    .loader span {
      width: 4px;
      height: 14px;
      background: var(--red-accent);
      border-radius: 3px;
      animation: equalize 0.8s ease-in-out infinite alternate;
    }

    .loader span:nth-child(2) { animation-delay: 0.15s; height: 8px; }
    .loader span:nth-child(3) { animation-delay: 0.3s;  height: 18px; }
    .loader span:nth-child(4) { animation-delay: 0.45s; height: 10px; }

    @keyframes equalize {
      from { transform: scaleY(0.4); }
      to   { transform: scaleY(1.2); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .profile-card, .music-player { border-radius: 16px; }
      .card-body { padding: 52px 20px 20px; }
    }
  </style>
</head>

  <!-- ====== MUSIC PLAYER ====== -->

      </div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="player-controls">
      <button class="ctrl-btn" id="btnPrev" title="Anterior">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6V6zm3.5 6 8.5 6V6l-8.5 6z"/></svg>
      </button>
      <button class="ctrl-btn play-pause" id="btnPlay" title="Play/Pause">
        <!-- Ícone de play por padrão; JS troca para pause -->
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl-btn" id="btnNext" title="Próximo">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>

    <div class="volume-row">
      <div class="volume-icon">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </div>
      <input class="volume-slider" type="range" id="volumeSlider" min="0" max="100" value="70" />
    </div>

    <!-- Playlist -->
    <div class="playlist" id="playlist"></div>
  </div>

</div>

<audio id="audioEl"></audio>

<script>
/* =====================================================
   ► CONFIGURAÇÃO — EDITE AQUI
   ===================================================== */

const CONFIG = {
  // Seu ID do Discord
  discordId: '722221048954748938',

  // Nome e bio exibidos (também sobrescritos pelo Lanyard se quiser)
  name: 'Saamm',
  bio: 'I did it <3',

  // ► AVATAR
  // https://raw.githubusercontent.com/SEU_USER/SEU_REPO/main/avatar.gif
  avatar: 'https://raw.githubusercontent.com/Sammsz5204/Me/main/Akame.gif',

  // ► PLAYLIST
  
  // art: URL raw do .webp da capa
  // src: URL raw do .mp3
  tracks: [
    {
      title:  'Ai No Uta',
      artist: 'Hatsune Miku',
      art:    'https://raw.githubusercontent.com/Sammsz5204/Me/main/AiNoUta.webp',
      src:    'https://raw.githubusercontent.com/Sammsz5204/Me/main/Ai%20No%20Uta%20-%20Hatsune%20Miku.mp3',
    },
    {
      title:  'The World Is Mine',
      artist: 'Hatsune Miku',
      art:    'https://raw.githubusercontent.com/Sammsz5204/Me/main/TheWorldIsMine.webp',
      src:    'https://raw.githubusercontent.com/Sammsz5204/Me/main/The%20World%20Is%20Mine%20-%20Hatsune%20Miku.mp3',
    },
    // Para adicionar mais músicas, suba o .mp3 e o .webp no seu repo e siga o padrão acima
  ],
};

/* =====================================================
   ► LANYARD — Discord RPC
   ===================================================== */

const LANYARD_WS  = 'wss://api.lanyard.rest/socket';
const LANYARD_API = `https://api.lanyard.rest/v1/users/${CONFIG.discordId}`;

let wsHeartbeat = null;

function connectLanyard() {
  const ws = new WebSocket(LANYARD_WS);

  ws.addEventListener('open', () => {
    console.log('[Lanyard] conectado');
  });

  ws.addEventListener('message', ({ data }) => {
    const { op, d } = JSON.parse(data);

    // op 1: Hello — inicia heartbeat e subscribe
    if (op === 1) {
      wsHeartbeat = setInterval(() => ws.send(JSON.stringify({ op: 3 })), d.heartbeat_interval);
      ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: CONFIG.discordId } }));
    }

    // op 0: Event (INIT_STATE ou PRESENCE_UPDATE)
    if (op === 0) updatePresence(d);
  });

  ws.addEventListener('close', () => {
    clearInterval(wsHeartbeat);
    console.log('[Lanyard] desconectado. Reconectando em 5s...');
    setTimeout(connectLanyard, 5000);
  });

  ws.addEventListener('error', () => ws.close());
}

function updatePresence(data) {
  const p = data.discord_user || data;
  const status = data.discord_status || 'offline';

  // Avatar do Discord (usa o do CONFIG se preferir seu gif customizado)
  const avatarHash = p.avatar;
  const discordAvatar = avatarHash
    ? `https://cdn.discordapp.com/avatars/${p.id}/${avatarHash}.${avatarHash.startsWith('a_') ? 'gif' : 'png'}?size=256`
    : null;

  // Usa avatar customizado do CONFIG, senão pega do Discord
  document.getElementById('avatarImg').src = CONFIG.avatar !== 'https://cdn.discordapp.com/embed/avatars/0.png'
    ? CONFIG.avatar
    : (discordAvatar || CONFIG.avatar);

  // Status dot
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (status === 'online' ? '' : status);

  // Bio (custom status do Discord)
  const customStatus = data.activities?.find(a => a.type === 4);
  document.getElementById('profileBio').textContent =
    (customStatus?.state || CONFIG.bio);

  // Atividade (Spotify ou outro app)
  const spotify  = data.spotify;
  const activity = data.activities?.find(a => a.type !== 4);

  const card     = document.getElementById('activityCard');
  const aIcon    = document.getElementById('activityIcon');
  const aType    = document.getElementById('activityType');
  const aName    = document.getElementById('activityName');
  const aDetail  = document.getElementById('activityDetail');

  if (spotify) {
    card.classList.add('visible');
    aIcon.src   = spotify.album_art_url || '';
    aIcon.style.borderRadius = '6px';
    aType.textContent   = '🎵 ouvindo no spotify';
    aName.textContent   = spotify.song;
    aDetail.textContent = `${spotify.artist} — ${spotify.album}`;
  } else if (activity) {
    card.classList.add('visible');
    const appId = activity.application_id;
    aIcon.src = appId
      ? `https://cdn.discordapp.com/app-icons/${appId}/${activity.assets?.large_image}.png?size=64`
      : '';
    aType.textContent   = ['jogando','transmitindo','ouvindo','assistindo','','competindo'][activity.type] || 'fazendo algo';
    aName.textContent   = activity.name || '—';
    aDetail.textContent = activity.details || activity.state || '';
  } else {
    card.classList.remove('visible');
  }
}

connectLanyard();

/* =====================================================
   ► PLAYER DE MÚSICAS
   ===================================================== */

const audio      = document.getElementById('audioEl');
const btnPlay    = document.getElementById('btnPlay');
const btnPrev    = document.getElementById('btnPrev');
const btnNext    = document.getElementById('btnNext');
const iconPlay   = document.getElementById('iconPlay');
const iconPause  = document.getElementById('iconPause');
const progressFill = document.getElementById('progressFill');
const progressBar  = document.getElementById('progressBar');
const timeElapsed  = document.getElementById('timeElapsed');
const timeDuration = document.getElementById('timeDuration');
const eqLoader     = document.getElementById('eqLoader');
const volSlider    = document.getElementById('volumeSlider');

let currentIndex = 0;
let isPlaying    = false;

function fmt(s) {
  const m = Math.floor(s / 60);
  const ss = String(Math.floor(s % 60)).padStart(2, '0');
  return `${m}:${ss}`;
}

function loadTrack(index, autoPlay = false) {
  const t = CONFIG.tracks[index];
  if (!t) return;

  document.getElementById('trackTitle').textContent  = t.title;
  document.getElementById('trackArtist').textContent = t.artist;
  document.getElementById('trackArt').src            = t.art;

  audio.src    = t.src;
  audio.volume = volSlider.value / 100;

  progressFill.style.width = '0%';
  timeElapsed.textContent  = '0:00';
  timeDuration.textContent = '0:00';
  progressBar.style.setProperty('--thumb-pos', '0%');

  renderPlaylist();
  if (autoPlay) playTrack();
}

function playTrack() {
  audio.play().catch(console.warn);
}

function pauseTrack() {
  audio.pause();
}

function setPlaying(state) {
  isPlaying = state;
  iconPlay.style.display  = state ? 'none' : 'block';
  iconPause.style.display = state ? 'block' : 'none';
  eqLoader.style.display  = state ? 'flex' : 'none';
}

btnPlay.addEventListener('click', () => {
  if (isPlaying) pauseTrack(); else playTrack();
});

btnPrev.addEventListener('click', () => {
  currentIndex = (currentIndex - 1 + CONFIG.tracks.length) % CONFIG.tracks.length;
  loadTrack(currentIndex, isPlaying);
});

btnNext.addEventListener('click', () => {
  currentIndex = (currentIndex + 1) % CONFIG.tracks.length;
  loadTrack(currentIndex, isPlaying);
});

audio.addEventListener('play',  () => setPlaying(true));
audio.addEventListener('pause', () => setPlaying(false));
audio.addEventListener('ended', () => {
  currentIndex = (currentIndex + 1) % CONFIG.tracks.length;
  loadTrack(currentIndex, true);
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  progressBar.style.setProperty('--thumb-pos', pct + '%');
  timeElapsed.textContent  = fmt(audio.currentTime);
  timeDuration.textContent = fmt(audio.duration);
});

progressBar.addEventListener('click', e => {
  const rect = progressBar.getBoundingClientRect();
  const pct  = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

volSlider.addEventListener('input', () => {
  audio.volume = volSlider.value / 100;
});

/* Playlist */
function renderPlaylist() {
  const el = document.getElementById('playlist');
  el.innerHTML = CONFIG.tracks.map((t, i) => `
    <div class="playlist-item ${i === currentIndex ? 'active' : ''}" data-index="${i}">
      <span class="pl-num">${i + 1}</span>
      <img class="pl-art" src="${t.art}" alt="">
      <div class="pl-info">
        <div class="pl-title">${t.title}</div>
        <div class="pl-artist">${t.artist}</div>
      </div>
    </div>
  `).join('');

  el.querySelectorAll('.playlist-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = +item.dataset.index;
      if (idx === currentIndex) {
        if (isPlaying) pauseTrack(); else playTrack();
      } else {
        currentIndex = idx;
        loadTrack(idx, true);
      }
    });
  });
}

// Init
document.getElementById('profileName').textContent = CONFIG.name;
document.getElementById('profileBio').textContent  = CONFIG.bio;
document.getElementById('avatarImg').src            = CONFIG.avatar;
loadTrack(0);
</script>
</body>
</html>
